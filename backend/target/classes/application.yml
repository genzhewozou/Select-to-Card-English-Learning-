spring:
  application:
    name: english-learning-backend
  datasource:
    url: jdbc:mysql://gateway01.us-west-2.prod.aws.tidbcloud.com:4000/github_sample?useSSL=true&requireSSL=true&trustServerCertificate=true&serverTimezone=UTC&characterEncoding=utf8
    username: 3jLiSiFakSm1n24.root
    password: 58tAQ9693GKdgzdG
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
