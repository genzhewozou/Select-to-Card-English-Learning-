# 英语学习系统 - 应用配置
# 遵循阿里巴巴开发规范，敏感信息建议使用环境变量或配置中心
spring:
  application:
    name: english-learning-backend
  datasource:
    # 本地 MySQL 默认不启用 SSL，避免 requireSSL 导致握手失败
    url: jdbc:mysql://localhost:3306/english_learning?useSSL=true&requireSSL=true&trustServerCertificate=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: woaini1996
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 60000
      validation-timeout: 5000
      keepalive-time: 30000
      initialization-fail-timeout: 120000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      # 含大量嵌入图的 Word 易超过 20MB，与 Tomcat 表单上限一并放宽
      max-file-size: 100MB
      max-request-size: 100MB

# 文档原件：本地开发默认 ./data/documents；生产环境见 application-prod.yml（当前为 /home/admin/deploy/data/documents）
# 也可覆盖：环境变量 DOCUMENT_STORAGE_ROOT
english-learn:
  document:
    storage-root: ${DOCUMENT_STORAGE_ROOT:./data/documents}

# 服务端口
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: 100MB

# 日志
logging:
  level:
    root: INFO
    com.english.learn: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
